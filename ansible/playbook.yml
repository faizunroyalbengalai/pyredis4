---
# Thin Ansible orchestrator for EC2.
# All runtime-specific behavior lives in `runtimes/<runtime>/*.yml.j2` so that
# editing one language's playbook (e.g. python) cannot affect any other.
- name: Deploy pyredis4
  hosts: all
  become: true
  gather_facts: yes
  vars:
    ansible_ssh_retries: 5
    app_dir: /opt/app
    app_port: 8000
    project: 'pyredis4'
    web_server: 'nginx'
    python_version: '3.11'
    entrypoint: 'app.main:app'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Wait for SSH to be fully ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _apt_update
      until: _apt_update is succeeded

    # ── Python runtime ────────────────────────────────────────────────────────
    - name: Install pip and venv (system Python)
      apt:
        name:
          - python3-pip
          - python3-venv
          - python3-dev
        state: present

    - name: Install Python {{ python_version }} (try default repos first, deadsnakes as fallback)
      block:
        - name: Install from default apt repos
          apt:
            name:
              - "python{{ python_version }}"
              - "python{{ python_version }}-venv"
              - "python{{ python_version }}-dev"
            state: present
            update_cache: yes
      rescue:
        - name: Add deadsnakes PPA via GPG key (older Ubuntu fallback)
          shell: |
            curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xF23C5A6CF475977595C89F51BA6932366A755776" \
              | gpg --dearmor --yes -o /usr/share/keyrings/deadsnakes.gpg
            . /etc/os-release
            echo "deb [signed-by=/usr/share/keyrings/deadsnakes.gpg] https://ppa.launchpadcontent.net/deadsnakes/ppa/ubuntu ${VERSION_CODENAME} main" \
              | tee /etc/apt/sources.list.d/deadsnakes.list
            apt-get update -qq
          args:
            executable: /bin/bash
        - name: Install Python {{ python_version }} from deadsnakes
          apt:
            name:
              - "python{{ python_version }}"
              - "python{{ python_version }}-venv"
              - "python{{ python_version }}-dev"
            state: present
            update_cache: yes
      when: python_version not in ('3', '')

    # ── Local database installation ───────────────────────────────────────────
    - name: Install Redis server
      apt:
        name: redis-server
        state: present
        update_cache: yes

    - name: Configure Redis to bind localhost only
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^bind '
        line: 'bind 127.0.0.1 -::1'

    - name: Ensure Redis is started
      systemd:
        name: redis-server
        state: started
        enabled: yes

    - name: Wait for Redis to be ready
      wait_for:
        port: 6379
        host: 127.0.0.1
        timeout: 60


    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Create Python virtual environment
      shell: |
        PY=$(command -v python{{ python_version }} 2>/dev/null || command -v python3)
        $PY -m venv {{ app_dir }}/venv
      args:
        executable: /bin/bash
        creates: "{{ app_dir }}/venv"

    - name: Install Python dependencies
      shell: |
        {{ app_dir }}/venv/bin/pip install --upgrade pip -q
        {{ app_dir }}/venv/bin/pip install -r {{ app_dir }}/requirements.txt -q
      args:
        executable: /bin/bash
    - name: Create .env file
      shell: |
        printf '' > {{ app_dir }}/.env
        DB_URL="{{ deploy_database_url | default('', true) }}"
        [ -n "$DB_URL" ] && printf 'DATABASE_URL=%s\n' "$DB_URL" >> {{ app_dir }}/.env || true
        printf 'PORT={{ app_port }}\nAPP_ENV=production\n' >> {{ app_dir }}/.env
      args:
        executable: /bin/bash
    - name: Write dependency connectivity probe
      copy:
        dest: "{{ app_dir }}/udap_probe.py"
        content: |
          #!/usr/bin/env python3
          """Connectivity probe — run after app start to verify dependencies are reachable.
          Exits 0 on success, 1 on failure so Ansible can gate the deploy."""
          import os, sys
          try:
              import redis
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "redis", "-q"])
              import redis
          url = os.environ.get("REDIS_URL", "redis://localhost:6379/0")
          try:
              r = redis.from_url(url, socket_connect_timeout=5)
              r.ping()
              print(f"Redis OK ({url})")
          except Exception as e:
              print(f"Redis UNREACHABLE: {e}", file=sys.stderr)
              sys.exit(1)

    - name: Run dependency connectivity probe
      shell: |
        set -a; source {{ app_dir }}/.env; set +a
        {{ app_dir }}/venv/bin/python {{ app_dir }}/udap_probe.py
      args:
        executable: /bin/bash
      register: probe_result
      retries: 5
      delay: 10
      until: probe_result.rc == 0


    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} FastAPI app
          After=network.target redis-server.service
          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/venv/bin/gunicorn {{ entrypoint }} \
            --workers 2 --worker-class uvicorn.workers.UvicornWorker \
            --bind 0.0.0.0:{{ app_port }} --timeout 120
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload and start web server
      service:
        name: "{{ 'apache2' if (web_server or 'nginx').lower() == 'apache' else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted
